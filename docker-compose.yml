services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-products_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./ProductosAPI.API
    ports:
      - "5073:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-products_db};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-root}"
      JwtSettings__Secret: "${JWT_SECRET:-mi-secreto-local-123-super-seguro-32chars}"
      JwtSettings__Issuer: "ProductosAPI"
      JwtSettings__Audience: "ProductosAPI"
      ASPNETCORE_URLS: "http://+:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./productos-front
      args:
        VITE_API_URL: http://localhost:5073
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata: