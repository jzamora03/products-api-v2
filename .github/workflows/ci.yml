name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore
        working-directory: ProductosAPI.API
      - name: Build
        run: dotnet build --no-restore -c Release
        working-directory: ProductosAPI.API

  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: productos-front/package-lock.json
      - name: Install
        run: npm ci
        working-directory: productos-front
      - name: Build
        run: npm run build
        working-directory: productos-front
        env:
          VITE_API_URL: http://localhost:5073

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build ./ProductosAPI.API
      - name: Build frontend image
        run: docker build ./productos-front